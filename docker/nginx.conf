server {
    listen 80;
    server_name _;

    # Безопасность
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' mc.yandex.ru yandex.ru *.yandex.ru www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *; media-src 'self' blob: *; connect-src 'self' *; frame-src 'self' oauth.telegram.org *.kodik.info *.kodikres.com *.kodik.biz rutube.ru *.rutube.ru www.googletagmanager.com;" always;

    # Go imageproxy
    location /api/image {
        proxy_pass http://imageproxy:8080/image;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Next.js
    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
}
