services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Go imageproxy ────────────────────────────────────────────────────────────
  imageproxy:
    image: ghcr.io/alexandrrcgit/animeview-imageproxy:latest
    # Для локальной сборки: docker compose --profile local up --build
    build:
      context: go
      dockerfile: Dockerfile.imageproxy
    restart: unless-stopped
    environment:
      - IMAGE_RATE_LIMIT_PER_MINUTE=240

  # ── Next.js ──────────────────────────────────────────────────────────────────
  nextjs:
    image: ghcr.io/alexandrrcgit/animeview-nextjs:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      imageproxy:
        condition: service_started

  # ── Go synckodik (каждый час) ────────────────────────────────────────────────
  synckodik:
    image: ghcr.io/alexandrrcgit/animeview-synckodik:latest
    build:
      context: go
      dockerfile: Dockerfile.synckodik
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_APP_URL=http://nextjs:3000
    depends_on:
      - nextjs

  # ── nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL: раскомментировать после получения сертификатов
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nextjs
      - imageproxy

volumes:
  redis_data:
