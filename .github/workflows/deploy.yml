name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # запуск вручную из GitHub → Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/animeView

            git fetch origin main
            git reset --hard origin/main

            cat > .env << 'ENVEOF'
            REDIS_URL=redis://redis:6379
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            KODIK_TOKEN=${{ secrets.KODIK_TOKEN }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_DISCORD_ID=${{ secrets.AUTH_DISCORD_ID }}
            AUTH_DISCORD_SECRET=${{ secrets.AUTH_DISCORD_SECRET }}
            AUTH_TELEGRAM_BOT_TOKEN=${{ secrets.AUTH_TELEGRAM_BOT_TOKEN }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            AUTH_TRUST_HOST=${{ secrets.AUTH_TRUST_HOST }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            ADMIN_USER_IDS=${{ secrets.ADMIN_USER_IDS }}
            ENVEOF

            docker compose up --build -d
            docker image prune -f
